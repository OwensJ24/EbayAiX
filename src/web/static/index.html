<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AgentX — Item Identifier</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 640px; margin: 3rem auto; padding: 0 1rem; color: #1a1a1a; }
  h1 { font-size: 1.4rem; }
  #dropzone { border: 2px dashed #999; border-radius: 8px; padding: 2rem; text-align: center; cursor: pointer; }
  #dropzone.drag { border-color: #333; background: #f5f5f5; }
  #status { margin-top: 1rem; white-space: pre-wrap; }
  #preview { max-width: 100%; max-height: 300px; margin-top: 1rem; display: none; }
  .error { color: #b00020; }
  pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  button { padding: 0.5rem 1rem; margin-top: 0.5rem; cursor: pointer; }
  input[type="text"], input[type="number"] { padding: 0.4rem; width: 100%; box-sizing: border-box; margin-top: 0.5rem; }
  #ebayStatus { font-size: 0.9rem; margin-bottom: 1.5rem; }
  #ebayStatus a { margin-left: 0.5rem; }
  .warning { background: #fff8e1; border: 1px solid #e0c060; border-radius: 6px; padding: 0.75rem 1rem; margin-top: 0.5rem; }
  label { display: block; margin-top: 1rem; font-weight: 600; }
</style>
</head>
<body>
  <h1>AgentX — Item Identifier</h1>
  <div id="ebayStatus">Checking eBay connection…</div>
  <p>Upload a photo of the item (JPEG/PNG/WEBP, up to 10MB).</p>

  <div id="dropzone">
    <p>Click to choose a file, or drag one here</p>
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.webp" hidden>
  </div>

  <img id="preview" alt="preview">
  <div id="status"></div>
  <div id="clarification" style="display:none;">
    <p><strong>Not confident on this one.</strong> What is the name of this item?</p>
    <input type="text" id="itemNameInput" placeholder="e.g. Sony WH-1000XM4 headphones">
    <button id="submitClarification">Continue</button>
  </div>
  <button id="priceButton" style="display:none;">Show Comparable Listings</button>
  <div id="priceStatus"></div>

  <div id="draftSection" style="display:none;">
    <label for="priceInput">Listing price (USD)</label>
    <input type="number" id="priceInput" min="0.01" step="0.01">
    <button id="draftButton">Create Draft Listing</button>
    <div id="draftStatus"></div>
  </div>

  <script>
    const MAX_BYTES = 10 * 1024 * 1024;
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const statusEl = document.getElementById('status');
    const clarificationEl = document.getElementById('clarification');
    const itemNameInput = document.getElementById('itemNameInput');
    const submitClarificationBtn = document.getElementById('submitClarification');
    const priceButton = document.getElementById('priceButton');
    const priceStatusEl = document.getElementById('priceStatus');
    const draftSection = document.getElementById('draftSection');
    const priceInput = document.getElementById('priceInput');
    const draftButton = document.getElementById('draftButton');
    const draftStatusEl = document.getElementById('draftStatus');

    let currentUploadId = null;
    let currentIdentification = null;

    const ebayStatusEl = document.getElementById('ebayStatus');
    fetch('/ebay/status')
      .then((res) => res.json())
      .then((data) => {
        if (data.connected) {
          ebayStatusEl.textContent = data.access_token_expired
            ? 'eBay: connected (token will refresh automatically)'
            : 'eBay: connected';
        } else {
          ebayStatusEl.innerHTML = 'eBay: not connected <a href="/ebay/connect">Connect eBay account</a>';
        }
      })
      .catch(() => { ebayStatusEl.textContent = 'eBay: status unavailable'; });

    dropzone.addEventListener('click', () => fileInput.click());
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('drag'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('drag');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => {
      if (fileInput.files.length) handleFile(fileInput.files[0]);
    });

    function handleFile(file) {
      clarificationEl.style.display = 'none';
      priceButton.style.display = 'none';
      priceStatusEl.innerHTML = '';
      draftSection.style.display = 'none';
      draftStatusEl.innerHTML = '';
      currentUploadId = null;
      currentIdentification = null;

      if (file.size > MAX_BYTES) {
        statusEl.innerHTML = `<p class="error">File is ${(file.size / 1024 / 1024).toFixed(1)}MB — max is 10MB.</p>`;
        return;
      }

      preview.src = URL.createObjectURL(file);
      preview.style.display = 'block';

      const formData = new FormData();
      formData.append('file', file);

      statusEl.textContent = 'Identifying…';
      fetch('/api/identify', { method: 'POST', body: formData })
        .then(async (res) => {
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Request failed');
          return data;
        })
        .then(handleResponse)
        .catch((err) => {
          statusEl.innerHTML = `<p class="error">${err.message}</p>`;
        });
    }

    function handleResponse(data) {
      currentUploadId = data.upload_id;
      if (data.status === 'needs_clarification') {
        currentIdentification = null;
        priceButton.style.display = 'none';
        draftSection.style.display = 'none';
        statusEl.innerHTML = `<p>Best guess so far:</p><pre>${JSON.stringify(data.result, null, 2)}</pre>`;
        clarificationEl.style.display = 'block';
      } else {
        clarificationEl.style.display = 'none';
        currentIdentification = data.result;
        priceButton.style.display = 'inline-block';
        statusEl.innerHTML = `<pre>${JSON.stringify(data.result, null, 2)}</pre>`;
      }
    }

    priceButton.addEventListener('click', () => {
      if (!currentIdentification) return;

      priceButton.disabled = true;
      priceStatusEl.textContent = 'Looking up comparable eBay listings…';

      fetch('/api/price', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(currentIdentification),
      })
        .then(async (res) => {
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Request failed');
          return data;
        })
        .then((data) => {
          priceStatusEl.innerHTML = `<pre>${JSON.stringify(data.result, null, 2)}</pre>`;

          const comps = data.result.comparable_listings || [];
          if (comps.length) {
            const avg = comps.reduce((sum, c) => sum + c.price, 0) / comps.length;
            priceInput.value = avg.toFixed(2);
          }
          draftStatusEl.innerHTML = '';
          draftSection.style.display = 'block';
        })
        .catch((err) => {
          priceStatusEl.innerHTML = `<p class="error">${err.message}</p>`;
        })
        .finally(() => {
          priceButton.disabled = false;
        });
    });

    draftButton.addEventListener('click', () => {
      if (!currentIdentification || !currentUploadId) return;

      const price = parseFloat(priceInput.value);
      if (!(price > 0)) {
        draftStatusEl.innerHTML = '<p class="error">Enter a price greater than 0.</p>';
        return;
      }

      draftButton.disabled = true;
      draftStatusEl.textContent = 'Creating draft listing on eBay…';

      fetch('/api/listing/draft', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ identification: currentIdentification, upload_id: currentUploadId, price }),
      })
        .then(async (res) => {
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Request failed');
          return data;
        })
        .then((data) => {
          const r = data.result;
          let html = `<p>Draft created — SKU <code>${r.sku}</code>, offer <code>${r.offer_id}</code>.</p>`;
          html += `<p><a href="${r.seller_hub_url}" target="_blank" rel="noopener">Open in eBay Seller Hub</a></p>`;
          if (r.missing.length) {
            html += `<div class="warning"><strong>Still needed before you can publish:</strong><ul>`;
            html += r.notes.map((n) => `<li>${n}</li>`).join('');
            html += `</ul></div>`;
          }
          draftStatusEl.innerHTML = html;
        })
        .catch((err) => {
          draftStatusEl.innerHTML = `<p class="error">${err.message}</p>`;
        })
        .finally(() => {
          draftButton.disabled = false;
        });
    });

    submitClarificationBtn.addEventListener('click', () => {
      const itemName = itemNameInput.value.trim();
      if (!itemName || !currentUploadId) return;

      statusEl.textContent = 'Refining…';
      clarificationEl.style.display = 'none';

      fetch('/api/identify/refine', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ upload_id: currentUploadId, item_name: itemName }),
      })
        .then(async (res) => {
          const data = await res.json();
          if (!res.ok) throw new Error(data.detail || 'Request failed');
          return data;
        })
        .then(handleResponse)
        .catch((err) => {
          statusEl.innerHTML = `<p class="error">${err.message}</p>`;
        });
    });
  </script>
</body>
</html>
